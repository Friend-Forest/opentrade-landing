<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
  <!-- Trapezoid outline: left side vertical, right side narrower -->
  <path d="M15 15 L85 25 L85 75 L15 85 Z"/>
  <!-- Top-left to bottom-right diagonal -->
  <line x1="15" y1="15" x2="85" y2="75"/>
  <!-- Bottom-left to top-right diagonal -->
  <line x1="15" y1="85" x2="85" y2="25"/>
</svg>
